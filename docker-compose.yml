version: '3.7'

services:
    db:
      container_name: mongo
      image: mongo:8.0
      restart: always
      environment:
        - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER}
        - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
        - MONGO_INITDB_DATABASE=${MONGO_DB}
      ports:
        - 27017:27017
      volumes:
        - mongo_data:/data/db
      networks:
        - backend

    redis:
      container_name: redis
      image: redis:8.0
      restart: always
      ports:
        - 6379:6379
      command: redis-server --requirepass ${REDIS_PASSWORD}
      volumes:
        - redis_data:/data
      networks:
        - backend

volumes:
  mongo_data:
  redis_data:

networks:
  backend